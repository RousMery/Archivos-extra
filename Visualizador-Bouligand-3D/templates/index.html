<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouligand Fibras</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Estructura de Bouligand</h1>

      <form id="form" class="controls">
        <label for="sentido">Sentido de giro</label>
        <select id="sentido" name="sentido">
          <option value="izquierda">Izquierda (levogira)</option>
          <option value="derecha">Derecha (dextrogira)</option>
        </select>
        <label for="angulo_final">Ángulo de rotación</label>
        <input id="angulo_final" name="angulo_final" type="number" value="180" step="1" />
        <button type="submit">Generar</button>
      </form>

      <p id="estado" class="estado"></p>
      <iframe id="viewer" title="Vista Bouligand"></iframe>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
